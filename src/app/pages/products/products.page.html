
 <ion-content>
   <app-header></app-header>

  <!-- <ion-title>Fanta</ion-title> -->
  <ion-grid style="padding-bottom: 0px; margin-bottom: -5px;">
    <ion-row>
      <ion-col size="3.5">
        <img [src]="categoryImg" class="category-img"/>
      </ion-col>
      <ion-col>
        <ion-label class="cat-name" [ngClass]="{'fanta-color': categoryName === 'Fanta', 'eighteeth-color': categoryName === 'Eighteeth', 'exam-depp-color': categoryName === 'Examvision' || categoryName === 'Deppeler', 'beyond-color': categoryName === 'Beyond', 'water-color':  categoryName === 'Waterpulse'}">{{categoryName}} <br>Products</ion-label>
      </ion-col>
    </ion-row>
  </ion-grid>
  <ion-segment value="devices" color="dark" mode="md" *ngIf="(devicesProducts.length > 0 && materialsProducts.length > 0)" [(ngModel)]="segmentValue">
    <ion-segment-button value="devices">
      <ion-label>Devices</ion-label>
    </ion-segment-button>
    <ion-segment-button value="materials">
      <ion-label>Materials</ion-label>
    </ion-segment-button>
  </ion-segment>

  <ion-grid>
     <ion-row>
       <ion-col size="6" *ngFor="let product of (segmentValue === 'devices' ? devicesProducts : materialsProducts)">
         <app-product-card class="product-card" [product]="product" (addProductClick)="addProduct($event)"></app-product-card>
       </ion-col>
     </ion-row>
  </ion-grid>
  <ion-fab vertical="bottom" horizontal="end" class="filter-fab" slot="fixed">
    <ion-fab-button id="open-filter-dialog">
      <ion-icon name="funnel-outline"></ion-icon>
    </ion-fab-button>
  </ion-fab>

  <ion-modal id="sort-modal" #modal trigger="open-filter-dialog">
    <ng-template>
      <div class="wrapper">
        <h1>Sort By</h1>

        <ion-list lines="none">
          <ion-item button="true" detail="false" (click)="changeSelectedSortBy('name', modal)">
            <ion-label>Name</ion-label>
            <ion-icon name="checkmark-done-outline" color="dark" *ngIf="selectedSortBy === 'name'"></ion-icon>
          </ion-item>

          <ion-item button="true" detail="false" (click)="changeSelectedSortBy('lowest-price', modal)">
            <ion-label>Lowest Price</ion-label>
            <ion-icon name="checkmark-done-outline" color="dark" *ngIf="selectedSortBy === 'lowest-price'"></ion-icon>
          </ion-item>
          <ion-item button="true" detail="false" (click)="changeSelectedSortBy('highest-price', modal)">
            <ion-label>Highest Price</ion-label>
            <ion-icon name="checkmark-done-outline" color="dark" *ngIf="selectedSortBy === 'highest-price'"></ion-icon>
          </ion-item>
          <ion-item button="true" detail="false" value="2" (click)="changeSelectedSortBy('best-selling', modal)">
            <ion-label>Best Selling</ion-label>
            <ion-icon name="checkmark-done-outline" color="dark"  *ngIf="selectedSortBy === 'best-selling'"></ion-icon>

          </ion-item>

        </ion-list>
      </div>
    </ng-template>
  </ion-modal>
  <ion-toast
  [isOpen]="isToastOpen"
  [message]="toastMessage"
  [duration]="2000"
  (didDismiss)="isToastOpen = false"
  position="middle"
></ion-toast>

<ion-alert
[isOpen]="isAlertOpen"
[message]="message"
[buttons]="['OK']"
(didDismiss)="isAlertOpen = false"
></ion-alert>

 </ion-content>
