<ion-card mode="md">
  <img class="product-img" [src]="getImgUrl(product.img)" [routerLink]="['/product-details',{productId: product.id}]"/>
  <ion-card-header [routerLink]="['/product-details',{productId: product.id}]">
    <ion-card-title>{{ product.description }}</ion-card-title>
    <ion-card-subtitle>{{ product.name }}</ion-card-subtitle>
  </ion-card-header>
  <ion-card-content>
    <div [ngClass]="{'old-price' : product.price !== product.priceAfterDiscount}">{{ product.price }} EGP </div>
    <div *ngIf="product.price !== product.priceAfterDiscount">
      {{ product.priceAfterDiscount }} EGP
    </div>
  </ion-card-content>
  <div *ngIf="product.available.toString() === 'false' && product.preBooking === 'true'" style="position: absolute; bottom: 5px; left: 10px; font-size: 12px; color: green; font-weight: bold;">
    Pre Booking
  </div>
  <ion-fab mode="md" vertical="bottom" horizontal="end" class="add-fab">
    <ion-fab-button (click)="onAddProduct()">
      <a>+</a>
    </ion-fab-button>
  </ion-fab>
</ion-card>
