<app-header></app-header>


<ion-content [fullscreen]="true">
  <ion-segment value="current" color="dark" mode="md" [(ngModel)]="segmentValue">
    <ion-segment-button value="current">
      <ion-label>Current Orders</ion-label>
    </ion-segment-button>
    <ion-segment-button value="old">
      <ion-label>Old Orders</ion-label>
    </ion-segment-button>
  </ion-segment>


<ion-grid>
  <ion-row *ngFor="let order of (segmentValue === 'current' ? currentOrders : oldOrders)">
    <ion-col>
      <ion-card class="ion-padding" (click)="order.expanded = !order.expanded">

        <ion-card-content class="card-sub-title">
          <ion-grid>
            <ion-row>
              <ion-item>
                <h1 style="font-size: 20px;">  Order No: {{order.no}} <label style="color: green;">(Shipped)</label></h1>
                <ion-icon  name="{{ order.expanded ? 'caret-down-outline' : 'caret-forward-outline' }}"  slot="end" ></ion-icon>
              </ion-item>
            </ion-row>

            <ion-grid class="ion-no-padding ion-no-margin" *ngIf="order.expanded">
              <ion-row>
                <ion-col size="5">
                  <h2 class="name">Hyper Light</h2>
                </ion-col>
                <ion-col>
                    x 1
                </ion-col>
                <ion-col class="price-col">
                  100 EGP
                </ion-col>
              </ion-row>
              <ion-row>
                <ion-col size="5">
                  <h2 class="name">Nano Pix</h2>
                </ion-col>
                <ion-col>
                    x 2
                </ion-col>
                <ion-col class="price-col">
                  500 EGP
                </ion-col>
              </ion-row>
              <ion-row>
                <ion-col size="5">
                  <h2 class="name">Digital Device</h2>
                </ion-col>
                <ion-col>
                    x 3
                </ion-col>
                <ion-col class="price-col">
                  400 EGP
                </ion-col>
              </ion-row>
              <ion-row>
                <ion-col>
                  <div class="line"></div>

                </ion-col>
              </ion-row>
            </ion-grid>
          </ion-grid>
          <ion-row>
            <h2 class="total-price"> Total Price: {{order.price}} EGP</h2>
          </ion-row>
        </ion-card-content>
      </ion-card>

    </ion-col>
  </ion-row>
</ion-grid>

</ion-content>
