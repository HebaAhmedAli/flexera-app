 <app-header></app-header>

<ion-content>

  <div class="adds-slider">
    <div class="swiper-container" >
      <div class="swiper-wrapper">

        <div class="swiper-slide" *ngFor="let add of adds;let i=index;"  [ngClass]="{'swiper-slide-not-active' : (i !== addsActiveIndex && (i + 1)  !== addsActiveIndex && (i-1) !== addsActiveIndex), 'swiper-slide-active' : i === addsActiveIndex, 'swiper-slide-around-active' : (i !== addsActiveIndex && ((i + 1)  === addsActiveIndex || (i-1) === addsActiveIndex))}" >
          <img *ngIf="add.type === 'img'" [src]="getImgUrl(add.url)" [id]="'adds_img' + i" (click)="openImageViewer(i)">
          <video [id]="'adds_video' + add.id" *ngIf="add.type === 'video'" width="100%" height="auto" (click)="openImageViewer( i)">
            <source [src]="getImgUrl(add.url)" type="video/mp4">
            Your browser does not support the video tag.
          </video>

          <ion-icon *ngIf="add.type === 'video'" name="play" class="play-icon" (click)="openImageViewer( i)"></ion-icon>
        </div>
      </div>

    </div>
  </div>

</ion-content>
