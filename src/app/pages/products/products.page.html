
 <app-header></app-header>
 <ion-content>
  <!-- <ion-title>Fanta</ion-title> -->
  <ion-grid style="padding-bottom: 0px; margin-bottom: -5px;">
    <ion-row routerLink="/products">
      <ion-col>
        <img src="assets/categories/fanta.png" class="category-img"/>
      </ion-col>
    </ion-row>
  </ion-grid>
  <ion-segment value="devices" color="dark" mode="md" *ngIf="(devicesProducts.length > 0 && materialsProducts.length > 0)" [(ngModel)]="segmentValue">
    <ion-segment-button value="devices">
      <ion-label>Devices</ion-label>
    </ion-segment-button>
    <ion-segment-button value="materials">
      <ion-label>Materials</ion-label>
    </ion-segment-button>
  </ion-segment>

  <ion-grid>
     <ion-row>
       <ion-col size="6" *ngFor="let product of (segmentValue === 'devices' ? devicesProducts : materialsProducts)" >
         <ion-card >
           <img [src]="product.img" routerLink="/product-details"/>
           <ion-card-header routerLink="/product-details">
             <ion-card-title>{{ product.name }}</ion-card-title>
             <ion-card-subtitle>{{ product.description }}</ion-card-subtitle>
           </ion-card-header>
           <ion-card-content>
            {{ product.price }}
           </ion-card-content>
           <!-- <ion-fab vertical="bottom" horizontal="end" class="add-fab">
             <ion-fab-button>
               <ion-icon name="add"></ion-icon>
             </ion-fab-button>
           </ion-fab> -->
         </ion-card>
       </ion-col>
     </ion-row>
  </ion-grid>
  <ion-fab vertical="bottom" horizontal="end" class="add-fab" slot="fixed">
    <ion-fab-button id="open-filter-dialog">
      <ion-icon name="funnel-outline"></ion-icon>
    </ion-fab-button>
  </ion-fab>

  <ion-modal id="sort-modal" #modal trigger="open-filter-dialog">
    <ng-template>
      <div class="wrapper">
        <h1>Sort By</h1>

        <ion-list lines="none">
          <ion-item button="true" detail="false" (click)="changeSelectedSortBy(0, modal)">
            <ion-label>Lowest Price</ion-label>
            <ion-icon name="checkmark-done-outline" color="dark" *ngIf="selectedSortBy === 0"></ion-icon>
          </ion-item>
          <ion-item button="true" detail="false" (click)="changeSelectedSortBy(1, modal)">
            <ion-label>Highest Price</ion-label>
            <ion-icon name="checkmark-done-outline" color="dark" *ngIf="selectedSortBy === 1"></ion-icon>
          </ion-item>
          <ion-item button="true" detail="false" value="2" (click)="changeSelectedSortBy(2, modal)">
            <ion-label>Best Selling</ion-label>
            <ion-icon name="checkmark-done-outline" color="dark"  *ngIf="selectedSortBy === 2"></ion-icon>

          </ion-item>
          <ion-item button="true" detail="false" (click)="changeSelectedSortBy(3, modal)">
            <ion-label>Name</ion-label>
            <ion-icon name="checkmark-done-outline" color="dark" *ngIf="selectedSortBy === 3"></ion-icon>
          </ion-item>
        </ion-list>
      </div>
    </ng-template>
  </ion-modal>
 </ion-content>
