<app-header></app-header>

<ion-content [fullscreen]="true">
  <ion-list *ngIf="notificationService.notifications.length !== 0">
    <ion-item *ngFor="let item of notificationService.notifications" [routerLink]="[item.url,{productId: item.urlItemId, course_id: item.urlItemId}]" [ngClass]="{'read': item.read , 'unread': !item.read}" (click)="updateNotifications(item)">
      <ion-label>
        <h2 style="font-weight: bold;">{{ item.title }}</h2>
        <p>{{ item.body }}</p>

      </ion-label>
    </ion-item>
 </ion-list>
</ion-content>
