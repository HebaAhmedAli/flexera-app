<ion-header>
  <ion-toolbar>
    <ion-title>
     {{type === 'terms' ? 'Terms and Conditions' : 'Privacy Policy'}}
    </ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="dismiss()">
        <ion-icon name="close"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div [innerHtml]="termsAndConditions | safeHtml"></div>
</ion-content>
