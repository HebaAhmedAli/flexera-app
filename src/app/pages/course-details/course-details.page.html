<app-header></app-header>


<ion-content [fullscreen]="true">
<ion-grid>
  <ion-row>
    <ion-col>
      <img [src]="image"/>
    </ion-col>
  </ion-row>
  <ion-row>
    <ion-col>
      <h1>{{course?.title}}</h1>
    </ion-col>
  </ion-row>
  <ion-row>
    <ion-col>
      <div dir="rtl" [innerHTML]="course?.details">
      </div>
    </ion-col>
  </ion-row>
</ion-grid>
</ion-content>
