<app-header></app-header>

<ion-content [fullscreen]="true">
  <ion-list *ngIf="notificationService.getUndeletedNotifications().length !== 0">
    <ion-item-sliding  *ngFor="let item of notificationService.getUndeletedNotifications()" >
      <ion-item  [ngClass]="{'read': item.read , 'unread': !item.read}"   (click)="updateNotifications(item)">
        <ion-label>
          <h2 style="font-weight: bold;">{{ item.title }}</h2>
          <p>{{ item.body }}</p>

        </ion-label>
      </ion-item>

      <ion-item-options>
        <ion-item-option color="danger" (click)="deleteNotification(item)">Delete</ion-item-option>
      </ion-item-options>
    </ion-item-sliding>
 </ion-list>
</ion-content>
