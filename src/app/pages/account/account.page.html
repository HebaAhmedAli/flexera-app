<app-header></app-header>


<ion-content [fullscreen]="true">
  <div *ngIf="mode !== 'guest'">
 <ion-grid>
  <ion-row>
    <ion-col class="name">
      <ion-label>Welcome DR. Abd Elrahman</ion-label>
    </ion-col>
  </ion-row>
  <ion-row>
    <ion-col class="ion-text-center">
    <div>
      <img [src]="photoURL" class="image" (click)="setOpenOfActionSheet(true)"/>
      <ion-icon name="camera" class="camera" (click)="setOpenOfActionSheet(true)"></ion-icon>
    </div>

    </ion-col>
  </ion-row>
  <ion-card>
    <ion-card-content>
      <div>
        <ion-icon name="create" class="edit" routerLink="/edit-profile"></ion-icon>
      <ion-grid>

        <ion-row>
          <ion-label>Name: {{title}} {{name}}</ion-label>
        </ion-row>
        <ion-row>
          <ion-label>Email: {{email}}</ion-label>
        </ion-row>
        <ion-row>
          <ion-label>Phone: {{phone}}</ion-label>
        </ion-row>
        <ion-row>
          <ion-label>Address: {{address}}</ion-label>
        </ion-row>
        <ion-row>
          <ion-label>Age: {{age}}</ion-label>
        </ion-row>
        <ion-row>
          <ion-label>Speciality: {{speciality}}</ion-label>
        </ion-row>
        <ion-row>
          <ion-label>University Staff: {{uniStaff}}</ion-label>
        </ion-row>
        <ion-row *ngIf="uniStaff === 'Yes'">
          <ion-label>University: {{university}}</ion-label>
        </ion-row>
      </ion-grid>
      </div>
    </ion-card-content>
  </ion-card>

 </ion-grid>


 <ion-action-sheet mode="ios"
  [isOpen]="isActionSheetOpen"
  [buttons]="actionSheetButtons"
  (didDismiss)="onActionSheetDismiss($event)"
></ion-action-sheet>


</div>


<div *ngIf="mode === 'guest'">
  <ion-grid>
    <ion-row class="ion-padding">
      <ion-col class="ion-text-center">
       <h1 style="font-weight: bold;"> You are not Logged in</h1>
      </ion-col>
    </ion-row>
    <ion-row class="ion-padding">
      <ion-col class="ion-text-center">
        <img src="assets/lock.png">
      </ion-col>
    </ion-row>
    <ion-row class="ion-padding">
      <ion-col class="ion-text-center ion-padding">
        <div class="button-container">
          <ion-button expand="block" class="main-button" routerLink="/login" routerDirection="forward">Navigate to Login</ion-button>
        </div>
      </ion-col>
    </ion-row>
  </ion-grid>
  </div>

</ion-content>
