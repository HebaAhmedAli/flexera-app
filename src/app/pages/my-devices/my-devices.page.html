<app-header></app-header>

<ion-content [fullscreen]="true">

  <ion-grid class="ion-text-center">


    <ion-row class="ion-margin">
      <ion-col style="border: none;">

      <div class="button-container" style="font-size: 25px;">
        Your Devices
      </div>
      </ion-col>
    </ion-row>

    <ion-grid style="margin-top: -20px;">
      <ion-row *ngFor="let device of myDevices;">
        <ion-col>
            <ion-card>
              <ion-card-content>
              <ion-grid>
                  <ion-row>
                    <ion-label>Product Name: {{device.product.name}}</ion-label>
                  </ion-row>
                  <ion-row>
                    <ion-label>Serial Number: {{device.serialNumber}}</ion-label>
                  </ion-row>
                  <ion-row>
                    <ion-label>Warranty Period: {{device.warrantyPeriod}}</ion-label>
                  </ion-row>
                  <ion-row>
                    <ion-label>Warranty Start Date: {{device.warrantyStartDate}}</ion-label>
                  </ion-row>
                  <ion-row>
                    <ion-label>Count Down: {{getWarrantyCountDown(device)}}</ion-label>
                  </ion-row>

             </ion-grid>
              </ion-card-content>
            </ion-card>
        </ion-col>
      </ion-row>
    </ion-grid>
