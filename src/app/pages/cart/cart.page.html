<app-header></app-header>

 <ion-content>
  <ion-list>
     <ion-item *ngFor="let item of cartItems">
       <ion-thumbnail slot="start">
         <img [src]="item.img">
       </ion-thumbnail>
       <ion-label>
         <h2>{{ item.name }}</h2>
         <p>{{ item.description }}</p>
         <p>Price: {{ item.price }}</p>
         <p>Quantity: {{ item.quantity }}</p>
       </ion-label>
       <ion-icon name="create-outline" color="dark" class="edit-icon" routerLink="/product-details"></ion-icon>
       <ion-icon name="trash-outline" color="dark" (click)="removeItemFromCart(item)"></ion-icon>
       <!-- <ion-button slot="end">Remove</ion-button> -->
     </ion-item>
  </ion-list>

  <ion-card>
     <ion-card-header>
       <ion-card-title>Cart Summary</ion-card-title>
     </ion-card-header>
     <ion-card-content>
       <p class="ion-padding-bottom">Total: 10000 EGP</p>
       <ion-button expand="block" class="main-button" routerLink="/checkout">Checkout</ion-button>
     </ion-card-content>
  </ion-card>
 </ion-content>
