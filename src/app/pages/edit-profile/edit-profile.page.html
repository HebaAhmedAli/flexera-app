<app-header></app-header>


<ion-content class="ion-padding">
  <div class="ion-padding container">
    <h1>Change Profile Info</h1>

    <div class="form-container">
      <ion-item>
        <ion-label position="floating">Name</ion-label>
        <ion-input [(ngModel)]="userName"></ion-input>
      </ion-item>
      <ion-item>
        <ion-label position="floating">Address</ion-label>
        <ion-input [(ngModel)]="userAddress"></ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="floating" >Email</ion-label>
        <ion-input [disabled]="true" [(ngModel)]="userEmail"></ion-input>
      </ion-item>
      <ion-item>
        <ion-label position="floating">Phone</ion-label>
        <ion-input  [disabled]="true" [(ngModel)]="userPhone"></ion-input>
      </ion-item>


      <ion-button expand="block" class="main-button" >Change</ion-button>


    </div>
  </div>
</ion-content>
